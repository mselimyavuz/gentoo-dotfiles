# --- GLOBAL BINDINGS ---
<C-p> = :prev-tab<Enter>
<C-n> = :next-tab<Enter>
<C-t> = :term<Enter>

# Alt tuşu düzeltmesi: <A-n> kullanımı
<A-1> = :prev-tab 10<Enter>:next-tab 0<Enter>
<A-2> = :prev-tab 10<Enter>:next-tab 1<Enter>
<A-3> = :prev-tab 10<Enter>:next-tab 2<Enter>
<A-4> = :prev-tab 10<Enter>:next-tab 3<Enter>
<A-5> = :prev-tab 10<Enter>:next-tab 4<Enter>

[messages]
# Navigasyon
j = :next<Enter>
k = :prev<Enter>
<C-d> = :next 50%<Enter>
<C-u> = :prev 50%<Enter>
g = :select 0<Enter>
G = :select -1<Enter>

# Mesaj İşlemleri
<Enter> = :view<Enter>
q = :quit<Enter>
a = :move "[Gmail]/All Mail"<Enter>
d = :move "[Gmail]/Trash"<Enter>
D = :delete<Enter>

# Yazma ve Yanıtlama (Mesaj Listesindeyken)
C = :compose<Enter>
r = :reply -q<Enter>
R = :reply -aq<Enter>
f = :forward<Enter>

# Klasör ve Hesap Gezinme
<C-j> = :next-folder<Enter>
<C-k> = :prev-folder<Enter>

# Arama ve Senkronizasyon
/ = :filter<space>
n = :next-result<Enter>
N = :prev-result<Enter>
S = :term mbsync -Va && notmuch new<Enter>

[view]
# Çıkış ve Navigasyon (Mesajlar arası)
q = :close<Enter>
J = :next<Enter>
K = :prev<Enter>

# --- Attachment & Part Navigation ---
# Use Ctrl-j/k to cycle through attachments/body
<C-j> = :next-part<Enter>
<C-k> = :prev-part<Enter>

# Attachment Operations
s = :save<Space>
S = :save -a<Space>
o = :open<Enter>
| = :pipe<Space>

# Okuma Esnasında Yanıtlama/İletme
r = :reply -q<Enter>
R = :reply -aq<Enter>
f = :forward<Enter>

# Okuma Esnasında Silme
d = :move "[Gmail]/Trash"<Enter>

[compose]
# Alanlar arası geçiş (To, Subject vb.)
<C-k> = :prev-field<Enter>
<C-j> = :next-field<Enter>
<tab> = :next-field<Enter>

[compose::editor]
$noinherit = true
<C-p> = :prev-tab<Enter>
<C-n> = :next-tab<Enter>

[compose::review]
# Neovim'den :wq ile çıktıktan sonra
y = :send<Enter>
n = :edit<Enter>
q = :abort<Enter>
a = :attach<space>
d = :detach<Enter>

[terminal]
$noinherit = true
<C-p> = :prev-tab<Enter>
<C-n> = :next-tab<Enter>

