[main]
shell=/usr/bin/zsh -c "tmux attach-session -t default || tmux new-session -s default"
font=Iosevka Nerd Font Mono:size=13 
underline-offset=2
pad=10x10
initial-window-mode=maximized

[shortcuts]
font-increase=none
font-decrease=none

[cursor]
style=block
blink=no

[mouse]
hide-when-typing=no

[scrollback]
lines=50000

[colors]
background=282828
foreground=ebdbb2
cursor=282828 ebdbb2

## Normal colors (Gruvbox Dark)
regular0=282828
regular1=cc241d
regular2=98971a
regular3=d79921
regular4=458588
regular5=b16286
regular6=689d6a
regular7=a89984

## Bright colors
bright0=928374
bright1=fb4934
bright2=b8bb26
bright3=fabd2f
bright4=83a598
bright5=d3869b
bright6=8ec07c
bright7=ebdbb2

selection-foreground=282828
selection-background=ebdbb2

[csd]
size=0

